name: Release

on:
  push:
    tags:
      - "[0-9]*"

permissions:
  contents: write

jobs:
  build:
    name: Deploy to Clojars
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify tag and build.clj version match
        shell: bash
        run: |
          VERSION=$(sed -n -e '/^(def version "\([^"]*\)".*$/s//\1/p' build.clj)
          TAG=${GITHUB_REF_NAME#v}
          [ "$VERSION" = "$TAG" ]

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - name: Deploy to Clojars
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
        run: |
          cd clj
          clojure -T:build deploy
